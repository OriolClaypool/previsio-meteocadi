<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteocadí — Generador de previsió</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--card:#1a2233;--border:#2a3550;--t1:#e8edf5;--t2:#8a96aa;--t3:#5a6578;--cyan:#06b6d4;--blue:#3b82f6;--body:"Inter",sans-serif;--mono:"Space Mono",monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--bg);color:var(--t1);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;display:flex;gap:2rem;flex-wrap:wrap}
.editor{flex:1 1 480px;min-width:320px}
.eh{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.eh .logo{color:var(--cyan);font-family:var(--mono);font-weight:700;font-size:1.1rem}
.eh .sub{color:var(--t3);font-size:.85rem}
.hint{color:var(--t3);font-size:.8rem;margin-bottom:2rem}
.fg{margin-bottom:1.25rem}
.fl{display:block;font-size:.7rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-family:var(--mono)}
textarea,input[type="text"],input[type="date"],select{width:100%;background:#111827;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--t1);font-size:.95rem;font-family:var(--body);outline:none}
textarea:focus,input:focus,select:focus{border-color:var(--cyan)}
textarea{resize:vertical}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7)}
.de{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.de.today{border-top:3px solid var(--cyan)}
.deh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.deh .dn{font-weight:600;font-size:1rem}
.deh .dd{color:var(--t3);font-size:.85rem;margin-left:8px}
.tag{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:4px;font-weight:600}
.tag-t{background:rgba(6,182,212,.15);color:var(--cyan)}
.tag-n{background:rgba(90,101,120,.2);color:var(--t3)}
.wg{display:flex;gap:6px;flex-wrap:wrap}
.wb{background:#111827;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--t2);font-size:.78rem;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:var(--body)}
.wb.active{background:rgba(6,182,212,.2);border-color:var(--cyan);color:var(--cyan)}
.wb:hover{border-color:var(--cyan)}
.wb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.dl{width:100%;padding:1rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#06b6d4,#3b82f6);color:#fff;font-weight:600;font-size:1rem;font-family:var(--body);box-shadow:0 8px 25px rgba(6,182,212,.3);transition:all .2s;margin-top:.5rem;display:block;text-align:center}
.dl:hover{transform:translateY(-1px)}
.pv{flex:1 1 320px;min-width:280px;position:sticky;top:1rem;align-self:flex-start}
.pvl{color:var(--t3);font-size:.8rem;margin-bottom:.75rem;font-family:var(--mono)}
.pvf{background:#111827;border:1px solid var(--border);border-radius:20px;padding:12px;max-width:400px;margin:0 auto}
.pvf canvas{width:100%;height:auto;border-radius:12px;display:block}
.ib{margin-top:1rem;padding:.75rem 1rem;background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.15);border-radius:10px;font-size:.78rem;color:var(--t2);line-height:1.5}
.ib strong{color:var(--cyan)}
.arow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
@media(max-width:768px){
  .app{flex-direction:column-reverse;padding:1rem;gap:1rem}
  .pv{position:static;min-width:unset;flex:unset;width:100%}
  .pvf{max-width:100%}
  .editor{min-width:unset}
  .eh .sub{display:none}
  .wb{padding:10px 12px;font-size:.85rem;border-radius:10px;min-height:44px}
  .wb svg{width:22px;height:22px}
  .wg{gap:8px}
  textarea,input[type="text"],input[type="date"],select{font-size:1rem;padding:12px;min-height:44px;border-radius:10px}
  .fl{font-size:.75rem;margin-bottom:6px}
  .fg{margin-bottom:1.5rem}
  .de{padding:1rem;border-radius:14px}
  .deh .dn{font-size:1.05rem}
  .dl{padding:1.1rem;font-size:1.05rem;border-radius:14px;min-height:52px}
  .ib{font-size:.82rem;padding:.9rem 1rem}
  select{width:auto!important;min-height:44px;padding:10px 12px}
  .arow{gap:8px}
}
</style>
</head>
<body>
<div class="app">
  <div class="editor">
    <div class="eh"><span class="logo">METEOCADÍ</span><span class="sub">Generador de previsió</span></div>
    <p class="hint">Omple les dades i descarrega la imatge per a Instagram Stories (1080×1920)</p>
    <div class="fg"><label class="fl">Data de la previsió</label><input type="date" id="dateInput"></div>
    <div class="de today" id="ed-0"></div>
    <div class="de" id="ed-1"></div>
    <div class="de" style="border-left:3px solid var(--cyan)">
      <div class="deh"><span class="dn" style="color:var(--cyan)">Pròxims dies</span><span class="tag tag-n">Opcional</span></div>
      <div class="fg"><label class="fl">Resum dels pròxims dies</label><textarea id="txSum" rows="3" placeholder="Canvi de temps a partir de dimecres..."></textarea></div>
    </div>
    <button class="dl" id="dlBtn">Descarregar PNG (1080×1920)</button>
    <div class="ib"><strong>Com funciona:</strong> Omple les dades, descarrega el PNG i puja'l a Instagram Stories.</div>
  </div>
  <div class="pv">
    <div class="pvl">// Previsualització</div>
    <div class="pvf"><canvas id="canvas"></canvas></div>
  </div>
</div>

const IMG_CACHE = {};
async function getIcon(key) {
  if (IMG_CACHE[key]) return IMG_CACHE[key];
  const b64 = ICON_B64[key];
  if (!b64) return null;
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { IMG_CACHE[key] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = 'data:image/svg+xml;base64,' + b64;
  });
}

      <div class="deh"><div><span class="dn" id="dn${idx}">${inf.name}</span><span class="dd" id="dd${idx}">${inf.full}</span></div><span class="tag ${cls}">${badge}</span></div>
      <div class="fg"><label class="fl">Temps</label><div class="wg" id="wg${idx}"></div></div>
      <div class="fg"><label class="fl">Avís meteorològic</label><div class="arow"><div class="wg" id="al${idx}"></div><select id="at${idx}" style="background:#111827;border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--t1);font-size:.8rem;width:auto">${ATK.map(k=>`<option value="${k}">${ATL[k]}</option>`).join("")}</select></div></div>
      <div class="fg"><label class="fl">Previsió del dia</label><textarea id="tx${idx}" rows="6" placeholder="${idx===0?'Jornada de pluges generalitzades al Prepirineu...':'Millora amb clarianes al matí. Vent moderat de nord...'}"></textarea></div>`;

    const wg=document.getElementById(`wg${idx}`);
    WK.forEach(k=>{
      const b=document.createElement("button");
      b.className=`wb${S.days[idx].weather===k?" active":""}`;
      b.innerHTML=`${WS[k]} ${WL[k]}`;
      b.onclick=()=>{S.days[idx].weather=k;wg.querySelectorAll(".wb").forEach(x=>x.classList.remove("active"));b.classList.add("active");draw()};
      wg.appendChild(b);
    });

    const ag=document.getElementById(`al${idx}`);
    AK.forEach(k=>{
      const b=document.createElement("button");
      const col=AC[k];
      b.className=`wb${S.days[idx].alert===k?" active":""}`;
      if(k!=="none"&&S.days[idx].alert===k){b.style.borderColor=col;b.style.color=col}
      b.innerHTML=k==="none"?"Cap":`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col}"></span> ${AL[k]}`;
      b.onclick=()=>{
        S.days[idx].alert=k;
        ag.querySelectorAll(".wb").forEach(x=>{x.classList.remove("active");x.style.borderColor="";x.style.color=""});
        b.classList.add("active");
        if(k!=="none"){b.style.borderColor=col;b.style.color=col}
        draw();
      };
      ag.appendChild(b);
    });

    document.getElementById(`at${idx}`).addEventListener("change",e=>{S.days[idx].alertType=e.target.value;draw()});
    document.getElementById(`tx${idx}`).addEventListener("input",e=>{S.days[idx].text=e.target.value;draw()});
  }

  buildDay(0,"Avui","tag-t");
  buildDay(1,"Demà","tag-n");
  document.getElementById("txSum").addEventListener("input",e=>{S.summary=e.target.value;draw()});
}

function refresh(){
  [0,1].forEach(i=>{
    const inf=dayInfo(i);
    const dn=document.getElementById(`dn${i}`);
    const dd=document.getElementById(`dd${i}`);
    if(dn)dn.textContent=inf.name;
    if(dd)dd.textContent=inf.full;
  });
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}

function wrapP(ctx,text,maxW){
  const lines=[];
  text.split("\n").forEach(p=>{
    if(!p.trim()){lines.push({t:"",gap:true});return}
    let line="";
    p.split(" ").forEach(w=>{
      const test=line+(line?" ":"")+w;
      if(ctx.measureText(test).width>maxW&&line){lines.push({t:line,gap:false});line=w}
      else line=test;
    });
    if(line)lines.push({t:line,gap:false});
  });
  return lines;
}

async function draw() {
  const cv=document.getElementById("canvas");
  const x=cv.getContext("2d");
  const W=1080,H=1920;
  cv.width=W; cv.height=H;

  const COL={
    bg1:"#0a1220",cardBg:"rgba(15,27,45,0.92)",cardBorder:"rgba(91,163,201,0.14)",
    accent:"#38bdf8",accent2:"#0284c7",title:"#7dd3fc",white:"#e8f4ff",
    sub:"#94a3b8",muted:"#4a6280",line:"rgba(91,163,201,0.1)",accentLine:"rgba(56,189,248,0.35)"
  };

  const bg=x.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0a1220");bg.addColorStop(0.5,"#0d1a2e");bg.addColorStop(1,"#0a1220");
  x.fillStyle=bg; x.fillRect(0,0,W,H);

  const glow=x.createRadialGradient(W/2,0,0,W/2,0,700);
  glow.addColorStop(0,"rgba(56,189,248,0.06)");glow.addColorStop(1,"transparent");
  x.fillStyle=glow; x.fillRect(0,0,W,H);

  const pad=52;
  const cX=60, cW=W-120;
  const ICON_SZ=210;
  const ICON_COL_W=ICON_SZ+pad;
  const TEXT_W=cW-pad*2-ICON_COL_W;

  let y=180;

  x.textAlign="center";
  x.fillStyle=COL.white;
  x.font="800 58px 'Inter',sans-serif";
  x.fillText("PREVISIÓ",W/2,y); y+=66;
  x.fillStyle=COL.accent;
  x.font="800 58px 'Inter',sans-serif";
  x.fillText("METEOROLÒGICA",W/2,y); y+=50;
  x.fillStyle=COL.sub;
  x.font="400 28px 'Inter',sans-serif";
  x.fillText(headerDate(),W/2,y); y+=20;
  const al=x.createLinearGradient(W/2-240,0,W/2+240,0);
  al.addColorStop(0,"transparent");al.addColorStop(.5,COL.accentLine);al.addColorStop(1,"transparent");
  x.strokeStyle=al; x.lineWidth=1.5;
  x.beginPath(); x.moveTo(W/2-240,y); x.lineTo(W/2+240,y); x.stroke();

  async function drawCard(dayIdx, yStart) {
    const d=S.days[dayIdx];
    const inf=dayInfo(dayIdx);
    const hasAlert=d.alert!=="none";
    const isToday=dayIdx===0;

    let textH=0;
    if(d.text.trim()){
      x.font=`400 34px 'Inter',sans-serif`;
      textH=wrapP(x,d.text,TEXT_W).reduce((s,l)=>s+(l.gap?26:50),0)+30;
    }
    let h=140;
    if(hasAlert) h+=56;
    h+=textH;
    h=Math.max(h,ICON_SZ+pad*2);

    const weatherTint={sol:"rgba(251,191,36,0.04)",solnuvol:"rgba(251,191,36,0.02)",solpluja:"rgba(96,165,250,0.04)",nuvol:"rgba(148,163,184,0.04)",pluja:"rgba(96,165,250,0.06)",tempesta:"rgba(167,139,250,0.05)",neu:"rgba(191,219,254,0.05)",boira:"rgba(148,163,184,0.04)",vent:"rgba(148,163,184,0.03)"};
    x.fillStyle=COL.cardBg; rr(x,cX,yStart,cW,h,24); x.fill();
    x.fillStyle=weatherTint[d.weather]||"transparent"; rr(x,cX,yStart,cW,h,24); x.fill();

    x.strokeStyle=hasAlert?AC[d.alert]+"55":COL.cardBorder; x.lineWidth=1.5;
    rr(x,cX,yStart,cW,h,24); x.stroke();

    const tg=x.createLinearGradient(cX,0,cX+cW,0);
    tg.addColorStop(0,hasAlert?AC[d.alert]:COL.accent);
    tg.addColorStop(1,hasAlert?AC[d.alert]:COL.accent2);
    x.strokeStyle=tg; x.lineWidth=isToday?5:3;
    x.beginPath(); x.moveTo(cX+24,yStart); x.lineTo(cX+cW-24,yStart); x.stroke();

    if(hasAlert){
      x.fillStyle=AC[d.alert];
      x.beginPath();
      x.moveTo(cX,yStart+24); x.lineTo(cX+7,yStart+24);
      x.lineTo(cX+7,yStart+h-24); x.lineTo(cX,yStart+h-24);
      x.closePath(); x.fill();
    }

    const iconX=cX+cW-pad-ICON_SZ;
    const iconY=yStart+(h-ICON_SZ)/2;
    const img=await getIcon(d.weather);
    if(img){
      const iconColors={sol:"#fbbf24",solnuvol:"#93c5fd",solpluja:"#7dd3fc",nuvol:"#cbd5e1",pluja:"#60a5fa",tempesta:"#fb923c",neu:"#e0f2fe",boira:"#94a3b8",vent:"#bae6fd"};
      const col=iconColors[d.weather]||"#e8f4ff";
      const tmp=document.createElement("canvas");
      tmp.width=ICON_SZ; tmp.height=ICON_SZ;
      const tc=tmp.getContext("2d");
      tc.fillStyle=col;
      tc.fillRect(0,0,ICON_SZ,ICON_SZ);
      tc.globalCompositeOperation="destination-in";
      tc.drawImage(img,0,0,ICON_SZ,ICON_SZ);
      x.drawImage(tmp,iconX,iconY);
    }

    let cy=yStart+pad+10;
    const textX=cX+pad;

    x.textAlign="left";
    x.fillStyle=isToday?COL.accent:COL.title;
    x.font=`700 46px 'Inter',sans-serif`;
    const dayLabel=isToday?"Avui":"Demà";
    x.fillText(dayLabel,textX,cy);
    const dnW=x.measureText(dayLabel).width;
    x.fillStyle=COL.muted;
    x.font=`400 30px 'Inter',sans-serif`;
    x.fillText("  "+inf.full,textX+dnW,cy);

    if(hasAlert){
      cy+=52;
      const acol=AC[d.alert];
      const atxt=`PERILL ${AL[d.alert].toUpperCase()} · ${(ATL[d.alertType]||"").toUpperCase()}`;
      x.font=`700 21px 'Space Mono',monospace`;
      const bw=x.measureText(atxt).width;
      x.fillStyle=acol; x.globalAlpha=0.12;
      rr(x,textX-8,cy-24,bw+28,36,8); x.fill();
      x.globalAlpha=1;
      x.strokeStyle=acol+"50"; x.lineWidth=1;
      rr(x,textX-8,cy-24,bw+28,36,8); x.stroke();
      x.fillStyle=acol; x.textAlign="left";
      x.fillText(atxt,textX+6,cy);
    }

    if(d.text.trim()){
      cy+=66;
      x.strokeStyle=COL.line; x.lineWidth=1;
      x.beginPath(); x.moveTo(textX,cy-20); x.lineTo(textX+TEXT_W,cy-20); x.stroke();
      x.textAlign="left"; x.fillStyle=COL.white;
      x.font=`400 34px 'Inter',sans-serif`;
      wrapP(x,d.text,TEXT_W).forEach(l=>{
        if(l.gap) cy+=26;
        else { x.fillText(l.t,textX,cy); cy+=50; }
      });
    }

    return yStart+h;
  }

  y+=36;
  y=await drawCard(0,y);
  y+=24;
  y=await drawCard(1,y);
  y+=24;

  if(S.summary&&S.summary.trim()){
    y+=8;
    x.font=`400 32px 'Inter',sans-serif`;
    const sumLines=wrapP(x,S.summary,cW-pad*2);
    const sumH=90+sumLines.reduce((s,l)=>s+(l.gap?24:48),0)+30;

    x.fillStyle=COL.cardBg; rr(x,cX,y,cW,sumH,24); x.fill();
    x.strokeStyle=COL.cardBorder; x.lineWidth=1;
    rr(x,cX,y,cW,sumH,24); x.stroke();

    x.fillStyle=COL.accent;
    x.beginPath();
    x.moveTo(cX,y+24); x.lineTo(cX+6,y+24);
    x.lineTo(cX+6,y+sumH-24); x.lineTo(cX,y+sumH-24);
    x.closePath(); x.fill();

    let scy=y+pad+4;
    x.textAlign="left"; x.fillStyle=COL.accent;
    x.font=`700 38px 'Inter',sans-serif`;
    x.fillText("Pròxims dies",cX+pad,scy);
    scy+=22;
    x.strokeStyle=COL.line; x.lineWidth=1;
    x.beginPath(); x.moveTo(cX+pad,scy); x.lineTo(cX+cW-pad,scy); x.stroke();
    scy+=36;
    x.fillStyle=COL.sub; x.font=`400 32px 'Inter',sans-serif`;
    sumLines.forEach(l=>{
      if(l.gap) scy+=24;
      else { x.fillText(l.t,cX+pad,scy); scy+=48; }
    });
  }

  const fy=H-80;
  const ftW=280,ftH=52,ftX=W/2-ftW/2,ftY=fy-36;
  x.fillStyle="rgba(56,189,248,0.10)";
  rr(x,ftX,ftY,ftW,ftH,26); x.fill();
  x.strokeStyle="rgba(56,189,248,0.25)"; x.lineWidth=1;
  rr(x,ftX,ftY,ftW,ftH,26); x.stroke();
  x.textAlign="center"; x.fillStyle=COL.white;
  x.font=`600 28px 'Inter',sans-serif`;
  x.fillText("@meteocadi",W/2,fy);
}

document.getElementById("dlBtn").addEventListener("click", function() {
  var btn=document.getElementById("dlBtn");
  btn.textContent="Generant…";
  btn.disabled=true;
  iconsReady.then(function(){return draw();}).then(function(){
    var cv=document.getElementById("canvas");
    var d=S.baseDate;
    var dataUrl=cv.toDataURL("image/png");
    var a=document.createElement("a");
    a.href=dataUrl;
    a.download="meteocadi-previsio-"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+".png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    btn.textContent="Descarregar PNG (1080×1920)";
    btn.disabled=false;
  });
});

iconsReady=Promise.all(WK.map(k=>getIcon(k)));
build();
iconsReady.then(()=>draw());
</script>
